name: Release
on:
  workflow_dispatch: # Manual trigger
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.0)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Updated to v4 for better performance

      - name: Setup Node.js
        uses: actions/setup-node@v4 # Updated to v4
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org/"
          scope: "@rahu619" # Package is scoped as @rahu619/cron-converter-u2q
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

      - name: Build
        run: npm run build

      # - name: Validate tag matches package.json version
      #   run: |
      #     PKG_VERSION=$(npm pkg get version | tr -d '"')
      #     if [ -z "$PKG_VERSION" ]; then
      #       echo "Error: package.json version is empty."
      #       exit 1
      #     fi

      #     TAG_VERSION="${GITHUB_REF_NAME#v}"
      #     if [ -z "$TAG_VERSION" ]; then
      #       echo "Error: Git tag (GITHUB_REF_NAME) is empty."
      #       exit 1
      #     fi

      #     if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
      #       echo "Error: Version mismatch between package.json ($PKG_VERSION) and tag ($TAG_VERSION)."
      #       exit 1
      #     fi
      - name: Publish to npmjs
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
